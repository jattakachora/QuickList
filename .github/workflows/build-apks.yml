name: Build Android APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: QuickList
        run: flutter pub get

      - name: Build split APKs
        working-directory: QuickList
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quicklist-apks
          path: |
            QuickList/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            QuickList/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            QuickList/build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
