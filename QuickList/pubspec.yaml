name: todo_tasker
description: "QuickList - smart list manager with Tasker integration."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  flutter_overlay_window: ^0.5.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/quicklist_icon.png
  adaptive_icon_background: "#0A1835"
  adaptive_icon_foreground: assets/icon/quicklist_icon.png
  min_sdk_android: 21

